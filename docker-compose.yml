services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: eduearth-server
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 6969
      CLIENT_BASE_URL: http://localhost:3000
    ports:
      - "6969:6969"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:6969/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: eduearth-client
    env_file:
      - ./client/.env.local
    environment:
      NEXT_PUBLIC_SERVER_URL: http://localhost:6969
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # Optional local postgres for development. Enable with:
  # docker compose --profile local-db up -d
  postgres:
    image: postgres:16-alpine
    profiles: ["local-db"]
    container_name: eduearth-postgres
    environment:
      POSTGRES_DB: eduearth
      POSTGRES_USER: eduearth
      POSTGRES_PASSWORD: eduearth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
