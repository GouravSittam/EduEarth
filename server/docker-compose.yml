services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eduearth-server-dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 6969
    ports:
      - "6969:6969"
    volumes:
      - ./src:/app/src
      - ./prisma.config.ts:/app/prisma.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - /app/node_modules
    command: sh -c "npx prisma generate && npm run dev"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:6969/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
