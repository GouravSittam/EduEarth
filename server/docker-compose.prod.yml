services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: eduearth-server
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 6969
    ports:
      - "6969:6969"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:6969/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
